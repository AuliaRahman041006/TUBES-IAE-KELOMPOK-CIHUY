server {
    listen 80;

    # User Service Endpoints
    location /api/register {
        proxy_pass http://user_service:8000/api/register;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/login {
        proxy_pass http://user_service:8000/api/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/user {
        proxy_pass http://user_service:8000/api/user;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Product Service Endpoints
    location /api/products {
        proxy_pass http://product_service:8000/api/products;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Order Service Endpoints
    location /api/orders {
        proxy_pass http://order_service:8000/api/orders;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Notification Service Endpoints
    location /api/notifications {
        proxy_pass http://notification_service:8000/api/notifications;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Fallback to 404
    location / {
        return 404 "{\"error\": \"Endpoint not found on API Gateway\"}";
    }
}
