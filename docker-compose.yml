# Docker Compose — E-Commerce Microservices
# Menjalankan semua services:  docker-compose up --build -d
# Menghentikan semua:          docker-compose down
# Melihat logs:                docker-compose logs -f
# Melihat logs 1 service:      docker-compose logs -f order-queue

services:

  # REDIS — Shared Message Broker untuk Queue & Cache
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # USER SERVICE (Port 8001)

  # MySQL Database untuk User Service
  user-db:
    image: mysql:8.0
    container_name: user-db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: user_service_db
    ports:
      - "3301:3306"
    volumes:
      - user-db-data:/var/lib/mysql
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Laravel App (PHP-FPM) untuk User Service
  user-app:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-app
    volumes:
      - ./user-service:/var/www/html
      - ./docker/entrypoint.sh:/usr/local/bin/entrypoint.sh
      - ./user-service/.env.docker:/var/www/html/.env
    entrypoint: ["bash", "/usr/local/bin/entrypoint.sh"]
    depends_on:
      user-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net

  # Nginx Web Server untuk User Service
  nginx-user:
    image: nginx:alpine
    container_name: nginx-user
    ports:
      - "8001:80"
    volumes:
      - ./user-service:/var/www/html
      - ./docker/nginx/user.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user-app
    networks:
      - ecommerce-net

  # Queue Worker untuk User Service
  user-queue:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-queue
    volumes:
      - ./user-service:/var/www/html
      - ./docker/queue-entrypoint.sh:/usr/local/bin/queue-entrypoint.sh
      - ./user-service/.env.docker:/var/www/html/.env
    entrypoint: ["bash", "/usr/local/bin/queue-entrypoint.sh"]
    depends_on:
      user-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net

  # PRODUCT SERVICE (Port 8002)
 
  product-db:
    image: mysql:8.0
    container_name: product-db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: product_service_db
    ports:
      - "3302:3306"
    volumes:
      - product-db-data:/var/lib/mysql
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10

  product-app:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-app
    volumes:
      - ./product-service:/var/www/html
      - ./docker/entrypoint.sh:/usr/local/bin/entrypoint.sh
      - ./product-service/.env.docker:/var/www/html/.env
    entrypoint: ["bash", "/usr/local/bin/entrypoint.sh"]
    depends_on:
      product-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net

  nginx-product:
    image: nginx:alpine
    container_name: nginx-product
    ports:
      - "8002:80"
    volumes:
      - ./product-service:/var/www/html
      - ./docker/nginx/product.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - product-app
    networks:
      - ecommerce-net

  product-queue:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-queue
    volumes:
      - ./product-service:/var/www/html
      - ./docker/queue-entrypoint.sh:/usr/local/bin/queue-entrypoint.sh
      - ./product-service/.env.docker:/var/www/html/.env
    entrypoint: ["bash", "/usr/local/bin/queue-entrypoint.sh"]
    depends_on:
      product-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ORDER SERVICE (Port 8003)

  order-db:
    image: mysql:8.0
    container_name: order-db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: order_service_db
    ports:
      - "3303:3306"
    volumes:
      - order-db-data:/var/lib/mysql
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10

  order-app:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-app
    volumes:
      - ./order-service:/var/www/html
      - ./docker/entrypoint.sh:/usr/local/bin/entrypoint.sh
      - ./order-service/.env.docker:/var/www/html/.env
    entrypoint: ["bash", "/usr/local/bin/entrypoint.sh"]
    depends_on:
      order-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net

  nginx-order:
    image: nginx:alpine
    container_name: nginx-order
    ports:
      - "8003:80"
    volumes:
      - ./order-service:/var/www/html
      - ./docker/nginx/order.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - order-app
    networks:
      - ecommerce-net

  order-queue:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-queue
    volumes:
      - ./order-service:/var/www/html
      - ./docker/queue-entrypoint.sh:/usr/local/bin/queue-entrypoint.sh
      - ./order-service/.env.docker:/var/www/html/.env
    entrypoint: ["bash", "/usr/local/bin/queue-entrypoint.sh"]
    depends_on:
      order-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net

  # FRONTEND (Port 80)

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "80:80"
    networks:
      - ecommerce-net

# NETWORKS & VOLUMES

networks:
  ecommerce-net:
    driver: bridge

volumes:
  redis-data:
  user-db-data:
  product-db-data:
  order-db-data:
