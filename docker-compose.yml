version: '3.8'

services:
  # ==========================================
  # API GATEWAY (Nginx)
  # ==========================================
  api_gateway:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user_service
      - product_service
      - order_service
      - notification_service
    networks:
      - microservices_net

  # ==========================================
  # HASURA GRAPHQL ENGINE
  # ==========================================
  hasura:
    image: hasura/graphql-engine:v2.36.0
    ports:
      - "8080:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:password@postgres_hasura:5432/hasura_meta
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true" # Aktifkan console Hasura di localhost:8080
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: "myadminsecret"
    depends_on:
      - postgres_hasura
      - postgres_user
      - postgres_product
      - postgres_order
      - postgres_notification
    networks:
      - microservices_net

  # ==========================================
  # DATABASES (PostgreSQL) - Separate per service
  # ==========================================
  postgres_hasura:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hasura_meta
    volumes:
      - pgdata_hasura:/var/lib/postgresql/data
    networks:
      - microservices_net

  postgres_user:
    image: postgres:15
    ports:
      - "5431:5432"
    environment:
      POSTGRES_USER: user_db_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user_db
    volumes:
      - pgdata_user:/var/lib/postgresql/data
    networks:
      - microservices_net

  postgres_product:
    image: postgres:15
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: product_db_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: product_db
    volumes:
      - pgdata_product:/var/lib/postgresql/data
    networks:
      - microservices_net

  postgres_order:
    image: postgres:15
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: order_db_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: order_db
    volumes:
      - pgdata_order:/var/lib/postgresql/data
    networks:
      - microservices_net

  postgres_notification:
    image: postgres:15
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: notif_db_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: notif_db
    volumes:
      - pgdata_notif:/var/lib/postgresql/data
    networks:
      - microservices_net

  # ==========================================
  # MESSAGE BROKER (Redis)
  # ==========================================
  redis_broker:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    networks:
      - microservices_net

  # ==========================================
  # MICROSERVICES (Laravel)
  # ==========================================
  user_service:
    build: 
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "8101:8000"
    volumes:
      - ./user-service:/app
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres_user
      - DB_PORT=5432
      - DB_DATABASE=user_db
      - DB_USERNAME=user_db_user
      - DB_PASSWORD=password
      - REDIS_HOST=redis_broker
    depends_on:
      - postgres_user
      - redis_broker
    networks:
      - microservices_net

  product_service:
    build: 
      context: ./product-service
      dockerfile: Dockerfile
    ports:
      - "8102:8000"
    volumes:
      - ./product-service:/app
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres_product
      - DB_PORT=5432
      - DB_DATABASE=product_db
      - DB_USERNAME=product_db_user
      - DB_PASSWORD=password
      - REDIS_HOST=redis_broker
    depends_on:
      - postgres_product
      - redis_broker
    networks:
      - microservices_net

  order_service:
    build: 
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "8103:8000"
    volumes:
      - ./order-service:/app
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres_order
      - DB_PORT=5432
      - DB_DATABASE=order_db
      - DB_USERNAME=order_db_user
      - DB_PASSWORD=password
      - REDIS_HOST=redis_broker
    depends_on:
      - postgres_order
      - redis_broker
    networks:
      - microservices_net

  notification_service:
    build: 
      context: ./notification-service
      dockerfile: Dockerfile
    ports:
      - "8104:8000"
    volumes:
      - ./notification-service:/app
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres_notification
      - DB_PORT=5432
      - DB_DATABASE=notif_db
      - DB_USERNAME=notif_db_user
      - DB_PASSWORD=password
      - REDIS_HOST=redis_broker
      - QUEUE_CONNECTION=redis
    depends_on:
      - postgres_notification
      - redis_broker
    networks:
      - microservices_net

volumes:
  pgdata_hasura:
  pgdata_user:
  pgdata_product:
  pgdata_order:
  pgdata_notif:

networks:
  microservices_net:
    driver: bridge
